name: CI

# PR과 main 외 브랜치 push에서 타입·린트·빌드 회귀를 배포 전에 잡는다.
# (Cloudflare 프로덕션 빌드는 main push 시점이라 사후 검증이므로, 여기서 선제 차단)
on:
  pull_request:
  push:
    branches-ignore:
      - main

# 같은 브랜치/PR에서 새 커밋이 오면 진행 중인 실행을 취소
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: check · lint · build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # packageManager 필드(pnpm@10.x)에서 버전을 읽어 설치
      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm check

      - name: Lint
        run: pnpm lint

      - name: Format check
        run: pnpm format:check

      - name: Build
        run: pnpm build
